<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Events - OffGrid</title>
  <link rel="stylesheet" href="css/main.css"/>
  <style>
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    .event-stack {
      display: grid;
      gap: 14px;
    }
    .event-card-row {
      padding: 18px;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
    }
    .event-card-row .meta {
      color: var(--text-2);
      font-size: 0.85rem;
      line-height: 1.5;
    }
    @media (max-width: 720px) {
      .event-card-row {
        flex-direction: column;
        align-items: stretch;
      }
      .event-card-row .btn {
        width: 100%;
        justify-content: center;
      }
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .modal-content {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 90%;
      max-width: 450px;
      padding: 24px;
      position: relative;
    }
    .star-rating {
      display: flex;
      gap: 8px;
      font-size: 1.5rem;
      margin: 16px 0;
    }
    .star {
      cursor: pointer;
      color: var(--text-3);
      transition: color 0.2s;
    }
    .star.active {
      color: var(--orange);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">Off<span class="brand-dot">Grid</span></a>
    <ul class="navbar-links">
      <li><a href="student_dashboard.html">Home</a></li>
      <li><a href="feed.html">Feed</a></li>
      <li><a href="explore.html">Explore</a></li>
      <li><a href="my_events.html" class="active">My Events</a></li>
      <li><a href="vote.html">Vote</a></li>
      <li><a href="student_profile.html">Profile</a></li>
    </ul>
    <div class="navbar-actions">
      <div class="avatar" onclick="window.location='student_profile.html'" style="cursor:pointer;" title="Profile">ST</div>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="page-header flex items-center justify-between">
      <div>
        <h1 class="page-title">My Events</h1>
        <p class="page-subtitle text-muted" id="myEventsSubtitle">Loading your registrations...</p>
      </div>
      <a href="explore.html" class="btn btn-primary btn-sm">Find Events</a>
    </div>

    <div class="stats-grid">
      <div class="card" style="padding:16px;text-align:center;"><div id="upcomingCount" style="font-family:var(--font-display);font-size:1.5rem;font-weight:800;color:var(--text);">0</div><div class="text-xs text-dim mt-2">Upcoming</div></div>
      <div class="card" style="padding:16px;text-align:center;"><div id="registeredCount" style="font-family:var(--font-display);font-size:1.5rem;font-weight:800;color:var(--green);">0</div><div class="text-xs text-dim mt-2">Registered</div></div>
      <div class="card" style="padding:16px;text-align:center;"><div id="availableCount" style="font-family:var(--font-display);font-size:1.5rem;font-weight:800;color:var(--orange);">0</div><div class="text-xs text-dim mt-2">Published Now</div></div>
      <div class="card" style="padding:16px;text-align:center;"><div id="pollCount" style="font-family:var(--font-display);font-size:1.5rem;font-weight:800;color:var(--accent-2);">0</div><div class="text-xs text-dim mt-2">Active Polls</div></div>
    </div>

    <div class="card">
      <div style="font-family:var(--font-display);font-weight:700;color:var(--text);margin-bottom:12px;">Registered Events</div>
      <div class="event-stack" id="myEventList">
        <p class="text-dim">Loading your events...</p>
      </div>
    </div>
  </div>

  <!-- Review Modal -->
  <div class="modal-overlay" id="reviewModal">
    <div class="modal-content">
      <h3 style="font-family:var(--font-display);font-weight:800;color:var(--text);margin-bottom:8px;">Rate Event</h3>
      <p class="text-xs text-dim mb-4" id="reviewEventTitle">Event Name</p>
      
      <div class="form-group">
        <label class="form-label">Rating</label>
        <div class="star-rating" id="starContainer">
          <span class="star" data-value="1">★</span>
          <span class="star" data-value="2">★</span>
          <span class="star" data-value="3">★</span>
          <span class="star" data-value="4">★</span>
          <span class="star" data-value="5">★</span>
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Your Review</label>
        <textarea id="reviewComment" class="form-input" rows="3" placeholder="What did you like or dislike?"></textarea>
      </div>
      
      <div style="display:flex;gap:12px;margin-top:24px;">
        <button class="btn btn-primary" style="flex:1;justify-content:center;" onclick="submitReview()">Submit Review</button>
        <button class="btn btn-ghost" onclick="closeReviewModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    async function cancelRegistration(eventId) {
      const response = await OffGridAuth.authorizedFetch(`/api/student/registrations/${eventId}`, {
        method: 'DELETE'
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        showToast(payload.error || 'Could not cancel this registration.', 'error');
        return;
      }
      showToast(payload.message || 'Registration cancelled.', 'success');
      loadMyEvents();
    }

    async function loadMyEvents() {
      if (!OffGridAuth.requireRole('student')) return;

      try {
        const [registrationsRes, dashboardRes, publicEventsRes] = await Promise.all([
          OffGridAuth.authorizedFetch('/api/student/registrations'),
          OffGridAuth.authorizedFetch('/api/student/dashboard'),
          fetch('/api/events')
        ]);

        if (!registrationsRes.ok || !dashboardRes.ok || !publicEventsRes.ok) {
          throw new Error('Unable to load your events right now.');
        }

        const registrations = await registrationsRes.json();
        const dashboard = await dashboardRes.json();
        const publicEvents = await publicEventsRes.json();

        document.getElementById('registeredCount').textContent = registrations.length;
        document.getElementById('upcomingCount').textContent = registrations.length;
        document.getElementById('availableCount').textContent = publicEvents.length;
        document.getElementById('pollCount').textContent = dashboard.activePolls || 0;
        document.getElementById('myEventsSubtitle').textContent = registrations.length
          ? `You are registered for ${registrations.length} event${registrations.length === 1 ? '' : 's'}.`
          : 'You have not registered yet. Published events are waiting in Explore.';

        const list = document.getElementById('myEventList');
        list.innerHTML = registrations.length
          ? registrations.map((entry) => {
              const e = entry.event;
              const isCompleted = e.status === 'completed';
              
              let actionBtn = '';
              if (isCompleted) {
                if (entry.isReviewed) {
                  actionBtn = `<span class="text-xs text-dim">Rated ${entry.myReview.rating} ★</span>`;
                } else {
                  actionBtn = `<button class="btn btn-primary btn-xs" type="button" onclick="openReviewModal('${e.id}', '${escapeHtml(e.title)}')">Rate & Review</button>`;
                }
              } else {
                actionBtn = `<button class="btn btn-ghost btn-sm" type="button" onclick="cancelRegistration('${e.id}')">Cancel Registration</button>`;
              }

              return `
                <div class="card event-card-row" style="${isCompleted ? 'opacity:0.8; border-color:var(--border-2);' : ''}">
                  <div>
                    <div style="font-family:var(--font-display);font-weight:700;color:var(--text);margin-bottom:4px;">
                      ${escapeHtml(e.title)}
                      ${isCompleted ? ' <span class="badge badge-purple" style="font-size:0.6rem;padding:1px 6px;">Completed</span>' : ''}
                    </div>
                    <div class="meta">
                      ${escapeHtml(e.clubName || 'Campus Organizer')}<br/>
                      ${escapeHtml(e.date || 'TBD')} at ${escapeHtml(e.time || 'TBD')}<br/>
                      ${escapeHtml(e.venue || 'Venue pending')}
                    </div>
                  </div>
                  <div>${actionBtn}</div>
                </div>
              `;
            }).join('')
          : '<p class="text-dim">No registrations yet. Use Explore to join published events from organizers.</p>';
      } catch (error) {
        document.getElementById('myEventsSubtitle').textContent = error.message;
        document.getElementById('myEventList').innerHTML = '<p class="text-dim">We could not load your event registrations just now.</p>';
      }
    }

    let currentReviewEventId = null;
    let currentRating = 0;

    function openReviewModal(eventId, title) {
      currentReviewEventId = eventId;
      document.getElementById('reviewEventTitle').textContent = title;
      document.getElementById('reviewModal').style.display = 'flex';
      setRating(0);
      document.getElementById('reviewComment').value = '';
    }

    function closeReviewModal() {
      document.getElementById('reviewModal').style.display = 'none';
    }

    function setRating(val) {
      currentRating = val;
      const stars = document.querySelectorAll('.star');
      stars.forEach(s => {
        const starVal = parseInt(s.getAttribute('data-value'));
        s.classList.toggle('active', starVal <= val);
      });
    }

    // Set up star click listeners
    document.querySelectorAll('.star').forEach(s => {
      s.addEventListener('click', () => {
        setRating(parseInt(s.getAttribute('data-value')));
      });
    });

    async function submitReview() {
      if (currentRating === 0) {
        showToast('Please select a rating', 'error');
        return;
      }
      
      const comment = document.getElementById('reviewComment').value.trim();
      const response = await OffGridAuth.authorizedFetch(`/api/student/events/${currentReviewEventId}/reviews`, {
        method: 'POST',
        body: JSON.stringify({ rating: currentRating, comment })
      });
      
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        showToast(data.error || 'Failed to submit review', 'error');
        return;
      }
      
      showToast('Thank you for your feedback!', 'success');
      closeReviewModal();
      loadMyEvents();
    }

    loadMyEvents();
  </script>
  <script src="js/app.js"></script>
</body>
</html>
