<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Organizer Profile - OffGrid</title>
  <link rel="stylesheet" href="css/main.css"/>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">Off<span class="brand-dot">Grid</span></a>
    <ul class="navbar-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="event_manage.html">Events</a></li>
      <li><a href="sponsors.html">Sponsors</a></li>
      <li><a href="proposals.html">Proposals</a></li>
      <li><a href="analytics.html">Analytics</a></li>
      <li><a href="organizer_profile.html" class="active">Profile</a></li>
    </ul>
    <div class="navbar-actions">
      <span class="badge badge-purple">Organizer</span>
      <div class="avatar" id="organizerAvatar" onclick="window.location='organizer_profile.html'" style="cursor:pointer;" title="Profile">OG</div>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="page-header flex items-center justify-between">
      <div>
        <h1 class="page-title">Organizer Profile</h1>
        <p class="page-subtitle text-muted" id="organizerProfileSubtitle">Loading your organizer profile...</p>
      </div>
      <button class="btn btn-danger btn-sm" type="button" onclick="OffGridAuth.signOut()">Sign Out</button>
    </div>
    <div class="grid-2">
      <div class="card">
        <div style="font-family:var(--font-display);font-weight:700;color:var(--text);margin-bottom:12px;">Organizer Details</div>
        <div style="display:grid;gap:12px;">
          <input id="profileName" class="form-input" placeholder="Organizer or club name"/>
          <input id="profileEmail" class="form-input" placeholder="Email" readonly/>
          <input id="profileCollege" class="form-input" placeholder="College"/>
          <input id="profilePassword" class="form-input" type="password" placeholder="New password (optional)"/>
          <button class="btn btn-primary" type="button" onclick="saveProfile()">Save Profile</button>
        </div>
      </div>
      <div class="card">
        <div style="font-family:var(--font-display);font-weight:700;color:var(--text);margin-bottom:12px;">Live Snapshot</div>
        <div id="organizerStats"><p class="text-dim">Loading organizer stats...</p></div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    function populateForm(user) {
      document.getElementById('profileName').value = user.name || '';
      document.getElementById('profileEmail').value = user.email || '';
      document.getElementById('profileCollege').value = user.college || '';
      document.getElementById('organizerAvatar').textContent = (user.name || 'OG').slice(0, 2).toUpperCase();
      document.getElementById('organizerProfileSubtitle').textContent = `Live profile for ${user.name || 'organizer'}.`;
    }

    async function loadProfile() {
      if (!OffGridAuth.requireRole('organizer')) return;
      const [profileRes, dashboardRes] = await Promise.all([
        OffGridAuth.authorizedFetch('/api/auth/me'),
        OffGridAuth.authorizedFetch('/api/organizer/dashboard')
      ]);
      if (!profileRes.ok || !dashboardRes.ok) {
        document.getElementById('organizerProfileSubtitle').textContent = 'Unable to load your organizer profile.';
        return;
      }
      const user = await profileRes.json();
      const dashboard = await dashboardRes.json();
      OffGridAuth.setSession(OffGridAuth.getToken(), user);
      populateForm(user);
      document.getElementById('organizerStats').innerHTML = `
        <div class="text-dim">Events: ${dashboard.totalEvents || 0}</div>
        <div class="text-dim">Registrations: ${dashboard.totalRegistrations || 0}</div>
        <div class="text-dim">Active Polls: ${dashboard.activePolls || 0}</div>
        <div class="text-dim">Pending Proposals: ${dashboard.pendingProposals || 0}</div>
      `;
    }

    async function saveProfile() {
      const response = await OffGridAuth.authorizedFetch('/api/auth/me', {
        method: 'PUT',
        body: JSON.stringify({
          name: document.getElementById('profileName').value.trim(),
          college: document.getElementById('profileCollege').value.trim(),
          password: document.getElementById('profilePassword').value
        })
      });
      const user = await response.json().catch(() => ({}));
      if (!response.ok) {
        showToast(user.error || 'Could not save your profile.', 'error');
        return;
      }
      OffGridAuth.setSession(OffGridAuth.getToken(), user);
      document.getElementById('profilePassword').value = '';
      populateForm(user);
      showToast('Organizer profile updated.', 'success');
    }

    loadProfile();
  </script>
</body>
</html>
