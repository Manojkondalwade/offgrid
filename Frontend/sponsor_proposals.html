<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sponsor Proposals - OffGrid</title>
  <link rel="stylesheet" href="css/main.css"/>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">Off<span class="brand-dot">Grid</span></a>
    <ul class="navbar-links">
      <li><a href="sponsor_dashboard.html">Dashboard</a></li>
      <li><a href="sponsor_events.html">All Events</a></li>
      <li><a href="sponsor_proposals.html" class="active">Proposals</a></li>
      <li><a href="sponsor_profile.html">Profile</a></li>
    </ul>
    <div class="navbar-actions">
      <span class="badge badge-orange">Sponsor</span>
      <div class="avatar" onclick="window.location='sponsor_profile.html'" style="cursor:pointer;" title="Profile">SP</div>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="page-header">
      <h1 class="page-title">My Proposals</h1>
      <p class="page-subtitle text-muted" id="myProposalSubtitle">Loading proposal history...</p>
    </div>
    <div id="myProposalList" class="grid-2">
      <div class="card"><p class="text-dim">Loading proposals...</p></div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    async function withdrawProposal(proposalId) {
      const response = await OffGridAuth.authorizedFetch(`/api/sponsor/proposals/${proposalId}`, {
        method: 'DELETE'
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        showToast(payload.error || 'Could not withdraw proposal.', 'error');
        return;
      }
      showToast(payload.message || 'Proposal withdrawn.', 'success');
      loadProposals();
    }

    async function loadProposals() {
      if (!OffGridAuth.requireRole('sponsor')) return;
      const response = await OffGridAuth.authorizedFetch('/api/sponsor/proposals');
      const list = document.getElementById('myProposalList');
      if (!response.ok) {
        document.getElementById('myProposalSubtitle').textContent = 'Unable to load proposals right now.';
        return;
      }
      const proposals = await response.json();
      document.getElementById('myProposalSubtitle').textContent = proposals.length
        ? `${proposals.length} live proposal${proposals.length === 1 ? '' : 's'} in your pipeline.`
        : 'You have not sent any proposals yet.';
      list.innerHTML = proposals.length
        ? proposals.map((proposal) => `
            <div class="card">
              <div style="font-family:var(--font-display);font-weight:700;color:var(--text);margin-bottom:6px;">${escapeHtml(proposal.eventTitle)}</div>
              <div class="text-dim" style="line-height:1.6;margin-bottom:12px;">
                Amount: ${escapeHtml(proposal.amount || 'Not specified')}<br/>
                Status: ${escapeHtml(proposal.status)}<br/>
                Perks: ${escapeHtml(proposal.perks || 'Not specified')}
              </div>
              <p class="text-dim" style="margin-bottom:12px;">${escapeHtml(proposal.message || 'No message provided.')}</p>
              ${(proposal.status === 'pending' || proposal.status === 'discussing') ? `
              <button class="btn btn-danger btn-sm" type="button" onclick="withdrawProposal('${proposal.id}')">Withdraw</button>
              ` : ''}
            </div>
          `).join('')
        : '<div class="card"><p class="text-dim">No proposals yet. Open Sponsor Events to send one.</p></div>';
    }

    loadProposals();
  </script>
</body>
</html>
